<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0b0f19">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Guardia Virtual Pro | Villegas Systems</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, set, push, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBpI_jtbEDhZFRESrn1E4kaDLfrLo72910",
    authDomain: "guardia-virtual-ccf52.firebaseapp.com",
    projectId: "guardia-virtual-ccf52",
    storageBucket: "guardia-virtual-ccf52.firebasestorage.app",
    messagingSenderId: "788405556652",
    appId: "1:788405556652:web:8f7c4d134ef8e52d2ed609",
    measurementId: "G-B607QZVWMF",
    databaseURL: "https://guardia-virtual-ccf52-default-rtdb.firebaseio.com/"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  window._db = db; window._fbRef = ref; window._fbSet = set; window._fbPush = push; window._fbGet = get; window._fbOnValue = onValue; window._fbUpdate = update;
  document.dispatchEvent(new Event('firebase-ready'));
</script>

<style>
:root {
  --bg: #0b0f19; --bg2: #111827; --card: #131a26; --card2: #1b2333;
  --cyan: #00f0ff; --cyan-glow: rgba(0, 240, 255, 0.3);
  --text: #f8fafc; --text2: #94a3b8; --border: rgba(0,240,255,0.1);
  --r: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

/* SPLASH SCREEN */
#splash { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
#splash.hide { opacity: 0; pointer-events: none; }
.splash-ball { width: 60px; height: 60px; border-radius: 50%; border: 3px solid transparent; border-top-color: var(--cyan); animation: spin 1s linear infinite; margin-bottom: 20px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* LOGIN SCREEN (Igual a la imagen solicitada) */
#screen-auth { display: flex; flex-direction: column; min-height: 100vh; padding: 20px; }
.auth-header { text-align: center; margin-bottom: 30px; padding-top: 20px; }
.auth-logo-box { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 15px; }
.auth-title { font-family: 'Bebas Neue'; font-size: 32px; letter-spacing: 2px; color: var(--cyan); }
.auth-subtitle { font-size: 11px; letter-spacing: 2px; color: var(--text2); text-transform: uppercase; }

.auth-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 25px; width: 100%; max-width: 400px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.auth-tabs { display: grid; grid-template-columns: 1fr 1fr; background: #070a11; padding: 4px; border-radius: 12px; margin-bottom: 25px; }
.auth-tab { background: none; border: none; color: var(--text2); padding: 10px; font-weight: 700; cursor: pointer; border-radius: 10px; font-size: 13px; }
.auth-tab.active { background: var(--cyan); color: #000; box-shadow: 0 0 15px var(--cyan-glow); }

.field { margin-bottom: 18px; }
.field label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; }
.input-wrap { position: relative; }
.input-wrap input, .input-wrap select { width: 100%; background: var(--bg2); border: 1px solid var(--border); padding: 14px 15px; border-radius: 12px; color: #fff; outline: none; font-family: 'Outfit'; }
.input-wrap input:focus { border-color: var(--cyan); box-shadow: 0 0 10px var(--cyan-glow); }

.btn { width: 100%; padding: 16px; background: var(--cyan); color: #000; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; font-size: 14px; }
.btn:active { transform: scale(0.98); }

/* STATS BAR (Abajo en el login) */
.auth-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: auto; padding-top: 30px; max-width: 400px; margin-left: auto; margin-right: auto; width: 100%; }
.stat-item { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 14px; text-align: center; }
.stat-val { font-family: 'Bebas Neue'; font-size: 22px; color: var(--cyan); display: block; }
.stat-lbl { font-size: 9px; color: var(--text2); text-transform: uppercase; }

/* APP LAYOUT (Para cuando ya entres) */
#app-main { display: none; flex-direction: column; min-height: 100vh; }
.header { background: var(--bg2); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.sidebar { width: 260px; border-right: 1px solid var(--border); display: none; padding: 20px 0; }
.main-content { flex: 1; padding: 20px; }

/* NAVBAR PARA MÓVIL (Abajo) */
.mobile-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); display: flex; justify-content: space-around; padding: 10px; border-top: 1px solid var(--border); z-index: 1000; }
.nav-item { background: none; border: none; color: var(--text2); font-size: 10px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
.nav-item.active { color: var(--cyan); }

@media(min-width: 768px) {
    #app-body { display: flex; max-width: 1400px; margin: 0 auto; width: 100%; }
    .sidebar { display: block; }
    .mobile-nav { display: none; }
    #screen-auth { justify-content: center; }
}

#toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--cyan); color: #000; padding: 12px 25px; border-radius: 30px; font-weight: 700; font-size: 13px; opacity: 0; transition: 0.3s; z-index: 10000; }
#toast.show { opacity: 1; top: 30px; }
.watermark { position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: rgba(255,255,255,0.02); pointer-events: none; }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-ball"></div>
  <h1 class="auth-title">VILLEGAS SYSTEMS</h1>
  <p class="auth-subtitle">Cargando seguridad...</p>
</div>

<!-- PANTALLA DE INICIO DE SESIÓN -->
<section id="screen-auth">
  <div class="auth-header">
    <div class="auth-logo-box">
      <span style="font-size: 40px;">🛡️</span>
      <div>
        <h1 class="auth-title">GUARDIA VIRTUAL PRO</h1>
        <p class="auth-subtitle">V1.0 • Villegas Systems</p>
      </div>
    </div>
    <div style="background: rgba(0,240,255,0.05); padding: 5px 15px; border-radius: 20px; display: inline-block; border: 1px solid var(--border);">
        <span style="color: var(--cyan); font-size: 12px; font-weight: 700;">Urb. Los Lagos — Acceso 24/7</span>
    </div>
  </div>

  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-log-btn" onclick="switchAuth('log')">Iniciar Sesión</button>
      <button class="auth-tab" id="tab-reg-btn" onclick="switchAuth('reg')">Registrarse</button>
    </div>

    <div id="form-log">
      <div class="field"><label>Usuario o Correo</label>
        <div class="input-wrap"><input id="log-user" type="text" placeholder="Ej: Admin2389"></div>
      </div>
      <div class="field"><label>Contraseña</label>
        <div class="input-wrap"><input id="log-pass" type="password" placeholder="••••••••"></div>
      </div>
      <button class="btn" onclick="doLogin()">INICIAR SESIÓN Y ACCEDER</button>
    </div>

    <div id="form-reg" style="display:none;">
        <div class="field"><label>Nombre Completo</label>
            <div class="input-wrap"><input id="reg-name" type="text" placeholder="Tu nombre"></div>
        </div>
        <div class="field"><label>Usuario</label>
            <div class="input-wrap"><input id="reg-user" type="text" placeholder="Nombre de usuario"></div>
        </div>
        <div class="field"><label>Contraseña</label>
            <div class="input-wrap"><input id="reg-pass" type="password" placeholder="••••••••"></div>
        </div>
        <button class="btn" onclick="doRegister()">ENVIAR SOLICITUD</button>
    </div>
  </div>

  <div class="auth-stats">
    <div class="stat-item"><span class="stat-val" id="s-vis">0</span><span class="stat-lbl">Visitantes</span></div>
    <div class="stat-item"><span class="stat-val" id="s-tra">0</span><span class="stat-lbl">Personal</span></div>
    <div class="stat-item"><span class="stat-val" id="s-res">0</span><span class="stat-lbl">Residentes</span></div>
  </div>
</section>

<!-- APP PRINCIPAL (OCULTA INICIALMENTE) -->
<div id="app-main">
    <header class="header">
        <div class="auth-logo-box" style="margin:0;">
            <span style="font-size: 20px;">🛡️</span>
            <h2 style="font-family:'Bebas Neue'; font-size:18px; letter-spacing:1px; color:var(--cyan);">VILLEGAS SYSTEMS</h2>
        </div>
        <div style="font-size:11px; font-weight:700; color:var(--text2);" id="user-display">Usuario</div>
    </header>

    <div id="app-body">
        <aside class="sidebar">
            <button class="sb-link active" onclick="nav('registro')">📝 Registrar Ingreso</button>
            <button class="sb-link" onclick="nav('bitacora')">📋 Bitácora Histórica</button>
            <button class="sb-link" onclick="nav('admin')" id="side-admin" style="display:none;">⚙️ Administración</button>
            <button class="sb-link" onclick="logout()" style="color:var(--danger); margin-top:20px;">🚪 Cerrar Sesión</button>
        </aside>

        <main class="main-content">
            <!-- VISTA: REGISTRO -->
            <div id="v-registro" class="screen active">
                <h2 style="margin-bottom:20px; font-family:'Bebas Neue'; letter-spacing:1px;">Nuevo Registro de Acceso</h2>
                <div class="auth-card" style="max-width:100%; margin:0;">
                    <div class="field"><label>Categoría</label>
                        <select id="ins-cat" class="input-wrap">
                            <option value="Visitante">Visitante</option>
                            <option value="Residente">Residente</option>
                            <option value="Trabajador">Trabajador</option>
                        </select>
                    </div>
                    <div class="field"><label>Nombre del Ciudadano</label><input id="ins-nom" type="text" class="input-wrap"></div>
                    <div class="field"><label>Cédula</label><input id="ins-id" type="text" class="input-wrap"></div>
                    <div class="field"><label>Destino (Casa/Apto)</label><input id="ins-des" type="text" class="input-wrap"></div>
                    <button class="btn" onclick="saveIngreso()">REGISTRAR ENTRADA</button>
                </div>
            </div>
            
            <!-- VISTA: BITÁCORA -->
            <div id="v-bitacora" class="screen">
                <h2 style="margin-bottom:20px; font-family:'Bebas Neue'; letter-spacing:1px;">Historial de Movimientos</h2>
                <div id="list-bitacora"></div>
            </div>

            <!-- VISTA: ADMIN -->
            <div id="v-admin" class="screen">
                <h2 style="margin-bottom:20px; font-family:'Bebas Neue'; letter-spacing:1px;">Panel Administrativo</h2>
                <div id="list-admin"></div>
            </div>
        </main>
    </div>

    <nav class="mobile-nav">
        <button class="nav-item active" onclick="nav('registro')">Registro</button>
        <button class="nav-item" onclick="nav('bitacora')">Bitácora</button>
        <button class="nav-item" onclick="nav('admin')" id="nav-admin" style="display:none;">Admin</button>
    </nav>
</div>

<div id="toast"></div>
<div class="watermark">Villegas Systems ®</div>

<script>
const MASTER_USER = "admin2389";
const MASTER_PASS = "admin123";
let CU = null;

window.toast = (msg) => {
    const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
};

window.switchAuth = (type) => {
    document.getElementById('form-log').style.display = type === 'log' ? 'block' : 'none';
    document.getElementById('form-reg').style.display = type === 'reg' ? 'block' : 'none';
    document.getElementById('tab-log-btn').classList.toggle('active', type === 'log');
    document.getElementById('tab-reg-btn').classList.toggle('active', type === 'reg');
};

window.nav = (id) => {
    document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
    document.getElementById('v-' + id).style.display = 'block';
    document.querySelectorAll('.nav-item, .sb-link').forEach(el => el.classList.remove('active'));
};

document.addEventListener('firebase-ready', () => {
    // Escuchar estadísticas globales para el login
    window._fbOnValue(window._fbRef(window._db, 'ingresos'), snap => {
        const data = snap.exists() ? Object.values(snap.val()) : [];
        document.getElementById('s-vis').textContent = data.filter(x => x.cat === 'Visitante').length;
        document.getElementById('s-res').textContent = data.filter(x => x.cat === 'Residente').length;
        document.getElementById('s-tra').textContent = data.filter(x => x.cat === 'Trabajador').length;
        renderBitacora(data);
        renderAdmin(snap.val() || {});
    });

    setTimeout(() => {
        document.getElementById('splash').classList.add('hide');
    }, 1500);
});

window.doLogin = () => {
    const u = document.getElementById('log-user').value.trim();
    const p = document.getElementById('log-pass').value.trim();

    if(u === MASTER_USER && p === MASTER_PASS) {
        CU = { name: "Admin Maestro", role: "admin" };
        startApp();
    } else {
        window.toast("Credenciales incorrectas");
    }
};

function startApp() {
    document.getElementById('screen-auth').style.display = 'none';
    document.getElementById('app-main').style.display = 'flex';
    document.getElementById('user-display').textContent = CU.name;
    if(CU.role === 'admin') {
        document.getElementById('side-admin').style.display = 'block';
        document.getElementById('nav-admin').style.display = 'block';
    }
}

window.logout = () => location.reload();

window.saveIngreso = async () => {
    const cat = document.getElementById('ins-cat').value;
    const nom = document.getElementById('ins-nom').value.trim();
    const id = document.getElementById('ins-id').value.trim();
    const des = document.getElementById('ins-des').value.trim();

    if(!nom || !id || !des) return window.toast("⚠️ Complete los campos");

    const nuevo = {
        cat, nom, id, des,
        fecha: new Date().toLocaleString(),
        status: (cat === 'Residente' ? 'Aprobado' : 'Pendiente'),
        ts: Date.now()
    };

    try {
        await window._fbPush(window._fbRef(window._db, 'ingresos'), nuevo);
        window.toast("✅ Registro exitoso");
        document.getElementById('ins-nom').value = "";
        document.getElementById('ins-id').value = "";
        document.getElementById('ins-des').value = "";
    } catch(e) { window.toast("Error Firebase"); }
};

function renderBitacora(data) {
    const container = document.getElementById('list-bitacora');
    container.innerHTML = "";
    data.sort((a,b) => b.ts - a.ts).forEach(item => {
        container.innerHTML += `
            <div class="auth-card" style="max-width:100%; margin-bottom:10px; padding:15px;">
                <div style="display:flex; justify-content:space-between;">
                    <strong>${item.nom}</strong>
                    <span style="font-size:10px; color:var(--cyan);">${item.cat}</span>
                </div>
                <p style="font-size:11px; color:var(--text2); margin:5px 0;">ID: ${item.id} | Destino: ${item.des}</p>
                <div style="font-size:10px; color:${item.status === 'Aprobado' ? 'var(--cyan)' : 'orange'}">● ${item.status}</div>
            </div>`;
    });
}

function renderAdmin(data) {
    const container = document.getElementById('list-admin');
    container.innerHTML = "";
    Object.entries(data).forEach(([key, item]) => {
        if(item.status === 'Pendiente') {
            container.innerHTML += `
                <div class="auth-card" style="max-width:100%; margin-bottom:10px; background:#1f2937;">
                    <strong>${item.nom}</strong> solicita acceso a <strong>${item.des}</strong>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <button class="btn btn-sm" onclick="decidir('${key}', 'Aprobado')">Aprobar</button>
                        <button class="btn btn-sm btn-danger" onclick="decidir('${key}', 'Denegado')">Denegar</button>
                    </div>
                </div>`;
        }
    });
}

window.decidir = (key, val) => {
    window._fbUpdate(window._fbRef(window._db, 'ingresos/' + key), { status: val });
    window.toast("Actualizado ✓");
};
</script>
</body>
</html>
