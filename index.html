<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1.0,user-scalable=no">
<title>VILLEGAS SYSTEMS | GUARD PRO</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<!-- Librerías PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, set, push, get, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBpI_jtbEDhZFRESrn1E4kaDLfrLo72910",
    authDomain: "guardia-virtual-ccf52.firebaseapp.com",
    projectId: "guardia-virtual-ccf52",
    storageBucket: "guardia-virtual-ccf52.firebasestorage.app",
    messagingSenderId: "788405556652",
    appId: "1:788405556652:web:8f7c4d134ef8e52d2ed609",
    measurementId: "G-B607QZVWMF",
    databaseURL: "https://guardia-virtual-ccf52-default-rtdb.firebaseio.com/"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  window._db = db; window._fbRef = ref; window._fbSet = set; window._fbPush = push; window._fbGet = get; window._fbOnValue = onValue; window._fbUpdate = update; window._fbRemove = remove;
  document.dispatchEvent(new Event('firebase-ready'));
</script>

<style>
  * { font-family:'Outfit',sans-serif; box-sizing:border-box; }
  :root { --primary: #2aff7a; --bg: #06120a; --bg2: #0b1d0f; --card: #0d1c10; --border: rgba(42,255,122,0.1); }
  body { background-color: var(--bg); color: #eef5f0; min-height: 100vh; }

  /* NAVEGACIÓN QUINIELA STYLE */
  .nav-tabs { display: flex; overflow-x: auto; background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; scrollbar-width: none; }
  .nav-tab { padding: 16px 20px; font-size: 11px; font-weight: 800; color: #3d6645; text-transform: uppercase; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.2s; }
  .nav-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

  /* COMPONENTES NEÓN */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; margin-bottom: 15px; }
  .inp { width:100%; background:#122016; border:1px solid #172a1b; padding:12px; border-radius:12px; font-size:14px; color:#fff; outline:none; }
  .inp:focus { border-color:var(--primary); box-shadow: 0 0 10px rgba(42,255,122,0.1); }
  .lbl { display:block; font-size:10px; color:#7da882; text-transform:uppercase; font-weight: 700; margin-bottom: 5px; margin-top: 10px; }
  
  .btn { width:100%; padding:14px; background:var(--primary); color:#000; border:none; border-radius:12px; font-size:13px; font-weight:800; cursor:pointer; text-transform: uppercase; }
  .btn:active { transform: scale(0.97); }

  .clock-neon { background: #000; border: 1px solid var(--primary); color: var(--primary); padding: 5px 12px; border-radius: 20px; font-family: monospace; font-size: 14px; font-weight: 800; box-shadow: 0 0 10px rgba(42,255,122,0.2); }

  /* WATERMARK */
  .watermark-fix { position: fixed; bottom: 12px; right: 12px; font-size: 10px; font-weight: 900; color: rgba(255,255,255,0.02); pointer-events: none; z-index: 100; }

  @media(min-width: 768px) { .app-container { max-width: 500px; margin: 0 auto; border-right: 1px solid var(--border); border-left: 1px solid var(--border); } }
</style>
</head>
<body>

<div class="app-container min-h-screen">
    
    <!-- PANTALLA: CARGA (SPLASH) -->
    <div id="splash" class="fixed inset-0 z-[9999] bg-[#06120a] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="w-16 h-16 border-4 border-green-900 border-t-green-400 rounded-full animate-spin"></div>
        <h1 class="mt-6 text-green-400 font-black tracking-widest text-2xl italic">VILLEGAS SYSTEMS</h1>
    </div>

    <!-- NAVEGACIÓN SUPERIOR -->
    <nav class="nav-tabs" id="main-nav" style="display:none;">
        <div class="nav-tab active" onclick="nav('visitas')">Visitas</div>
        <div class="nav-tab" onclick="nav('registro')">Registro</div>
        <div class="nav-tab" onclick="nav('residentes')">Censo</div>
        <div class="nav-tab" onclick="nav('stats')">Estadísticas</div>
    </nav>

    <!-- HEADER OPERATIVO -->
    <div id="op-header" class="p-4 flex justify-between items-center bg-[#0b1d0f] border-bottom border-white/5" style="display:none;">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-green-900 rounded-lg flex items-center justify-center text-xs">🛡️</div>
            <div>
                <p id="op-name" class="text-white font-black text-xs">Cargando...</p>
                <p id="op-role" class="text-[8px] text-green-500 font-bold uppercase">Personal Activo</p>
            </div>
        </div>
        <div id="shift-clock" class="clock-neon">00:00:00</div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="p-4 pb-20">
        
        <!-- LOGIN SCREEN -->
        <div id="screen-login" class="flex flex-col justify-center min-h-[80vh]">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-black italic text-green-500">VILLEGAS SYSTEMS</h1>
                <p class="text-[10px] text-slate-500 font-bold tracking-widest uppercase">Guardia Virtual Pro</p>
            </div>
            <div class="card">
                <div class="field"><label class="lbl">Usuario Maestro</label><input id="l-user" type="text" class="inp" placeholder="Admin2389"></div>
                <div class="field">
                    <label class="lbl">Contraseña</label>
                    <input id="l-pass" type="password" class="inp" placeholder="••••••••">
                </div>
                <button class="btn mt-4" onclick="doLogin()">INICIAR TURNO</button>
            </div>
        </div>

        <!-- SECCIÓN VISITAS -->
        <div id="v-visitas" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-black italic">BITÁCORA</h2>
                <button class="bg-green-500 text-black px-3 py-1 text-[9px] font-black rounded" onclick="exportPDF()">PDF</button>
            </div>
            <!-- Buscador -->
            <div class="card space-y-2">
                <input type="text" id="v-search" placeholder="🔍 Buscar por nombre, casa..." class="inp" oninput="renderVisitas()">
                <div class="grid grid-cols-2 gap-2">
                    <select id="f-casa" class="inp text-[11px]" onchange="renderVisitas()"><option value="">Todas las casas</option></select>
                    <select id="f-cat" class="inp text-[11px]" onchange="renderVisitas()">
                        <option value="">Cualquier tipo</option>
                        <option value="Residente">Residentes</option>
                        <option value="Visitante">Visitantes</option>
                        <option value="Delivery">Deliverys</option>
                    </select>
                </div>
            </div>
            <div id="list-visitas" class="space-y-3"></div>
        </div>

        <!-- SECCIÓN REGISTRO -->
        <div id="v-registro" class="hidden">
            <h2 class="text-xl font-black italic mb-4">REGISTRAR ENTRADA</h2>
            <div class="card">
                <div class="field"><label class="lbl">Categoría</label>
                    <select id="i-cat" class="inp" onchange="toggleRegFields()">
                        <option value="Visitante">Visitante</option>
                        <option value="Residente">Residente</option>
                        <option value="Familiar">Familiar Autorizado</option>
                        <option value="Trabajador">Trabajador de Casa</option>
                        <option value="Delivery">Delivery</option>
                    </select>
                </div>
                <div class="field"><label class="lbl">Casa (Lagos 01-200)</label>
                    <select id="i-casa" class="inp" onchange="checkCenso()"></select>
                </div>
                <div id="censo-tip" class="hidden p-3 bg-green-900/20 border border-green-500/20 rounded-xl mb-4 text-[11px]"></div>
                <div class="field"><label class="lbl">Nombre Completo</label><input id="i-nom" type="text" class="inp"></div>
                <div class="field"><label class="lbl">Tipo de Vehículo</label>
                    <select id="i-veh" class="inp">
                        <option value="🚗 Sedan">Sedan</option>
                        <option value="🛻 Pickup">Pickup</option>
                        <option value="⛳ Golf Cart">Carrito de Golf</option>
                        <option value="🏍️ Moto">Motocicleta</option>
                        <option value="🚶 A pie">Peatonal</option>
                    </select>
                </div>
                <div class="field"><label class="lbl">Estatus de Entrada</label>
                    <select id="i-status" class="inp">
                        <option value="Aprobado por llamada">Aprobado por llamada</option>
                        <option value="Autorizado por Censo">Autorizado por Censo</option>
                        <option value="Denegado">Acceso Denegado</option>
                    </select>
                </div>
                <button class="btn mt-4" onclick="saveIngreso()">REGISTRAR AHORA</button>
            </div>
        </div>

        <!-- SECCIÓN CENSO -->
        <div id="v-residentes" class="hidden">
            <h2 class="text-xl font-black italic mb-4">CENSO RESIDENCIAL</h2>
            <div class="card">
                <div class="field"><label class="lbl">ID Casa</label><input id="c-id" type="text" class="inp" placeholder="Lagos 01"></div>
                <div class="field"><label class="lbl">Propietarios</label><input id="c-nom" type="text" class="inp"></div>
                <div class="field"><label class="lbl">Teléfonos</label><input id="c-tel" type="text" class="inp"></div>
                <div class="field"><label class="lbl">Personal Autorizado Fijo</label><textarea id="c-fix" class="inp" rows="2"></textarea></div>
                <button class="btn mt-2" onclick="saveCenso()">GUARDAR DATOS</button>
            </div>
        </div>

    </main>
</div>

<div class="watermark-fix">VILLEGAS SYSTEMS ®</div>

<script>
const MASTER_U = "Admin2389"; const MASTER_P = "admin123";
let CU = null; let shiftSecs = 0; let shiftInt = null;
let _db = { ingresos: {}, censo: {} };

function toast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

window.nav = (id) => {
    document.querySelectorAll('.hidden, [id^="v-"]').forEach(s => s.classList.add('hidden'));
    document.getElementById('v-'+id).classList.remove('hidden');
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    const activeTab = Array.from(document.querySelectorAll('.nav-tab')).find(t => t.textContent.toLowerCase().includes(id.substring(0,3)));
    if(activeTab) activeTab.classList.add('active');
};

document.addEventListener('firebase-ready', () => {
    const db = window._db;
    // Llenar SELECT de casas
    const sel = document.getElementById('i-casa');
    const fCasa = document.getElementById('f-casa');
    for(let i=1; i<=200; i++){
        let n = i<10 ? '0'+i : i;
        let opt = `<option value="Lagos ${n}">Lagos ${n}</option>`;
        sel.insertAdjacentHTML('beforeend', opt); fCasa.insertAdjacentHTML('beforeend', opt);
    }

    window._fbOnValue(window._fbRef(db, 'ingresos'), snap => { _db.ingresos = snap.val() || {}; renderVisitas(); });
    window._fbOnValue(window._fbRef(db, 'censo'), snap => { _db.censo = snap.val() || {}; });

    setTimeout(() => { document.getElementById('splash').classList.add('hide'); }, 1000);
});

window.doLogin = () => {
    const u = document.getElementById('l-user').value.trim();
    const p = document.getElementById('l-pass').value.trim();

    if(u === MASTER_U && p === MASTER_P){
        CU = { name: "Administrador Maestro", role: "Super Admin" };
        startApp();
    } else {
        toast("Acceso Denegado");
    }
};

function startApp(){
    document.getElementById('screen-login').classList.add('hidden');
    document.getElementById('main-nav').style.display = 'flex';
    document.getElementById('op-header').style.display = 'flex';
    document.getElementById('op-name').textContent = CU.name;
    
    shiftInt = setInterval(() => {
        shiftSecs++;
        let h = Math.floor(shiftSecs/3600).toString().padStart(2,'0');
        let m = Math.floor((shiftSecs%3600)/60).toString().padStart(2,'0');
        let s = (shiftSecs%60).toString().padStart(2,'0');
        document.getElementById('shift-clock').textContent = `${h}:${m}:${s}`;
    }, 1000);
    nav('visitas');
}

window.checkCenso = () => {
    const casa = document.getElementById('i-casa').value;
    const box = document.getElementById('censo-tip');
    if(_db.censo[casa]){
        const c = _db.censo[casa];
        box.innerHTML = `✅ <b>Registrados:</b> ${c.nom}<br>🛠 <b>Fijos:</b> ${c.fix || 'Ninguno'}`;
        box.classList.remove('hidden');
    } else box.classList.add('hidden');
};

window.saveIngreso = async () => {
    const casa = document.getElementById('i-casa').value;
    const nom = document.getElementById('i-nom').value.trim();
    if(!nom) return toast("Nombre requerido");

    const data = {
        casa, nom, cat: document.getElementById('i-cat').value,
        veh: document.getElementById('i-veh').value,
        status: document.getElementById('i-status').value,
        fecha: new Date().toLocaleDateString('es-VE'),
        hora: new Date().toLocaleTimeString('es-VE', {hour:'2-digit', minute:'2-digit'}),
        ts: Date.now()
    };

    if(data.cat === 'Residente' && !_db.censo[casa]){
        await window._fbUpdate(window._fbRef(window._db, 'censo/'+casa), { nom, tel: 'Auto-reg' });
    }

    await window._fbPush(window._fbRef(window._db, 'ingresos'), data);
    toast("✅ Entrada Registrada");
    document.getElementById('i-nom').value = ""; nav('visitas');
};

function renderVisitas(){
    const c = document.getElementById('list-visitas');
    const qText = document.getElementById('v-search').value.toLowerCase();
    const qCasa = document.getElementById('f-casa').value;
    const all = Object.entries(_db.ingresos).sort((a,b) => b[1].ts - a[1].ts);
    c.innerHTML = "";

    all.filter(([id, i]) => {
        return (i.nom.toLowerCase().includes(qText) || i.casa.toLowerCase().includes(qText)) && (qCasa === "" || i.casa === qCasa);
    }).forEach(([id, i]) => {
        const isDeny = i.status.includes("Denegado");
        c.innerHTML += `
            <div class="card border-l-4 ${isDeny?'border-red-500':'border-green-500'}">
                <div class="flex justify-between items-start">
                    <div>
                        <span class="text-green-400 font-black text-sm">${i.casa}</span>
                        <h3 class="font-bold text-white text-base">${i.nom}</h3>
                    </div>
                    <span class="badge ${isDeny?'bg-red-500/20 text-red-500':'b-ok'}">${i.status}</span>
                </div>
                <div class="flex gap-3 text-[10px] text-slate-500 mt-2 font-bold uppercase">
                    <span>${i.veh}</span> • <span>${i.cat}</span>
                </div>
                <div class="flex justify-between items-center mt-3 pt-2 border-t border-white/5 text-[9px] text-slate-600 font-bold">
                    <span>${i.fecha} ${i.hora}</span>
                    <button class="text-red-900" onclick="deleteReg('${id}')">Eliminar</button>
                </div>
            </div>`;
    });
}

window.saveCenso = async () => {
    const id = document.getElementById('c-id').value.trim();
    if(!id) return toast("ID Casa requerido");
    await window._fbUpdate(window._fbRef(window._db, 'censo/'+id), { nom: document.getElementById('c-nom').value, tel: document.getElementById('c-tel').value, fix: document.getElementById('c-fix').value });
    toast("✓ Censo Actualizado");
};

window.deleteReg = (id) => { if(confirm("¿Borrar registro?")) window._fbRemove(window._fbRef(window._db, 'ingresos/'+id)); };

window.exportPDF = () => {
    const { jsPDF } = window.jspdf; const doc = new jsPDF();
    doc.setFillColor(6, 18, 10); doc.rect(0, 0, 210, 30, 'F');
    doc.setTextColor(42, 255, 122); doc.setFontSize(18); doc.text("VILLEGAS SYSTEMS - REPORTE DE SEGURIDAD", 15, 20);
    const rows = Object.values(_db.ingresos).map(i => [i.fecha, i.hora, i.casa, i.nom, i.cat, i.status]);
    doc.autoTable({ head: [['Fecha', 'Hora', 'Casa', 'Nombre', 'Tipo', 'Estatus']], body: rows, startY: 35, theme: 'grid' });
    doc.save("Bitacora_Lagos.pdf");
};
</script>
</body>
</html>
